<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Azure File Attacher</title>

    <!-- Office.js — MUST load before our code -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Fluent UI icons (optional, for a native Outlook look) -->
    <link rel="stylesheet"
          href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <link rel="stylesheet" href="taskpane.css"/>
</head>
<body>
    <div id="app">
        <!-- ─── Header ─── -->
        <header class="header">
            <div class="header-icon">
                <i class="ms-Icon ms-Icon--Attach" aria-hidden="true"></i>
            </div>
            <div class="header-text">
                <h1>Azure File Attacher</h1>
                <p class="subtitle">Attach files to your email</p>
            </div>
        </header>

        <!-- ════════════════════════════════════════════════════
             DROP ZONE
             ════════════════════════════════════════════════════ -->
        <section id="paneDrop" class="pane active">
            <!-- Drop zone -->
            <div id="dropZone" class="drop-zone">
                <div class="drop-zone-content">
                    <i class="ms-Icon ms-Icon--CloudUpload drop-icon" aria-hidden="true"></i>
                    <p class="drop-title">Drop files here</p>
                    <p class="drop-subtitle">Drag from desktop, paste (Ctrl+V), or click to browse</p>
                </div>
                <!-- Active drag-over state -->
                <div class="drop-zone-active" style="display:none;">
                    <i class="ms-Icon ms-Icon--CheckMark drop-icon-active" aria-hidden="true"></i>
                    <p>Release to attach</p>
                </div>
            </div>

            <!-- Or pick from disk -->
            <div class="file-pick-row">
                <label class="file-pick-label" for="filePicker">
                    <i class="ms-Icon ms-Icon--OpenFile" aria-hidden="true"></i>
                    Browse from this computer
                </label>
                <input type="file" id="filePicker" multiple style="display:none;"
                       onchange="handleFilePick(event)"/>
            </div>

            <!-- Queued / attached list -->
            <div id="attachmentList" class="attachment-list"></div>
        </section>

        <!-- ─── Status bar ─── -->
        <footer id="statusBar" class="status-bar">
            <span id="statusText">Ready</span>
        </footer>
    </div>

    <!-- ─── Scripts ─── -->
    <script src="taskpane.js"></script>
</body>
</html>
